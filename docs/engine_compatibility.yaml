    validated_on:
      torch: null
      transformers: null
      cuda: null
      driver: null
  mid:
    torch: '>=2.12,<2.15'
    transformers: '>=4.50,<5.0'
    python: '3.10'
    cuda: '12.8'
    note: torch nightly for sm_120 (RTX 5060 Ti). 'mid' refers to transformers 4.x, not torch stability.
