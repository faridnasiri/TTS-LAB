    notes: 600+ languages. Real-time (0.67× RTF). Voice cloning needs is_torchcodec_available=False shim (torchcodec v99.0.0 stub conflicts with ASR pipeline). LLM must be evicted before loading — Docker socket auto-eviction added 2026-06-29.
