  qwen3tts:
    status: supported
    container: engine-qwen
    stack: mid
    vram_est_mb: 6000
    dependencies:
      torch: '>=2.10,<2.11'
      transformers: '>=4.51,<4.54'
      huggingface_hub: '>=0.34,<1.0'
      qwen_tts: ==0.1.1
    incompatibilities:
    - ROPE_INIT_FUNCTIONS['default'] removed in transformers 5.x
    - TransformGetItemToIndex added in transformers 4.54 (qwen_tts chokes)
    - is_offline_mode removed in huggingface-hub >= 1.0
    - inputs_embeds signature changed in transformers 5.x
    gated_model: Qwen/Qwen3-TTS-12Hz-1.7B-Base
    needs_hf_token: true
    notes: Switched from CustomVoice (no voice clone) to Base (generate_voice_clone + x-vector-only mode). 3s ref audio clones in 10 languages.
    promotion_requirements:
    - build_import
    - model_load
    - synthesis
    - vram_measured
    validated_on:
      torch: null
      transformers: null
      cuda: null
      driver: null
    validation:
      build_import:
        status: pending
        last_tested: null
        description: qwen_tts import + ROPE default check (build-time)
      model_load:
        status: pending
        last_tested: null
        description: Qwen3TTSModel.from_pretrained (Base variant) on RTX 5060 Ti
      synthesis:
        status: pending
        last_tested: null
        description: generate_voice_clone with ref_audio + ref_text (ICL) and x_vector_only_mode
      vram_measured:
        status: pending
        last_tested: null
        description: nvidia-smi before/after — target ≤ 6 GB
